name: Build Windows App

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Windows app and installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore src/KeyDisabler.App/KeyDisabler.App.csproj

      - name: Publish portable app
        run: dotnet publish src/KeyDisabler.App/KeyDisabler.App.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true /p:EnableCompressionInSingleFile=true -o publish

      - name: Download Interception driver package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Invoke-WebRequest -Uri "https://github.com/oblitum/Interception/releases/download/v1.0.1/Interception.zip" -OutFile "interception.zip"
          Expand-Archive -Path "interception.zip" -DestinationPath "interception" -Force
          $dll = Get-ChildItem -Path "interception" -Recurse -Filter "interception.dll" | Where-Object { $_.FullName -match "x64" } | Select-Object -First 1
          if (-not $dll) { throw "x64 interception.dll not found" }
          Copy-Item $dll.FullName "publish\interception.dll" -Force
          $installer = Get-ChildItem -Path "interception" -Recurse -Filter "install-interception.exe" | Select-Object -First 1
          if (-not $installer) { throw "install-interception.exe not found" }
          New-Item -ItemType Directory -Force -Path "publish\driver" | Out-Null
          Copy-Item -Path "$($installer.Directory.FullName)\*" -Destination "publish\driver" -Recurse -Force

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path installer-output | Out-Null
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "src\KeyDisabler.Installer\KeyDisabler.iss"

      - name: Package portable zip
        shell: pwsh
        run: |
          Compress-Archive -Path publish\* -DestinationPath KeyDisabler-portable-win-x64.zip -Force
          Copy-Item installer-output\KeyDisablerSetup.exe KeyDisablerSetup-win-x64.exe -Force

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: KeyDisabler-portable-win-x64
          path: KeyDisabler-portable-win-x64.zip

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: KeyDisabler-installer-win-x64
          path: KeyDisablerSetup-win-x64.exe

      - name: Publish release assets
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: keydisabler-${{ github.run_number }}
          name: Key Disabler Build ${{ github.run_number }}
          draft: false
          prerelease: true
          files: |
            KeyDisablerSetup-win-x64.exe
            KeyDisabler-portable-win-x64.zip
