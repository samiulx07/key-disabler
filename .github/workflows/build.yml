name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_NAME: KeyDisabler
  DOTNET_VERSION: 10.0.x

jobs:
  build:
    name: Build, Pack & Release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore src/${{ env.APP_NAME }}.App/${{ env.APP_NAME }}.App.csproj

      - name: Publish app
        run: >
          dotnet publish src/${{ env.APP_NAME }}.App/${{ env.APP_NAME }}.App.csproj
          -c Release -r win-x64 --self-contained true
          /p:PublishSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true
          /p:EnableCompressionInSingleFile=true
          -o publish

      - name: Download Interception driver package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Invoke-WebRequest -Uri "https://github.com/oblitum/Interception/releases/download/v1.0.1/Interception.zip" -OutFile "interception.zip"
          Expand-Archive -Path "interception.zip" -DestinationPath "interception" -Force
          $dll = Get-ChildItem -Path "interception" -Recurse -Filter "interception.dll" | Where-Object { $_.FullName -match "x64" } | Select-Object -First 1
          if (-not $dll) { throw "x64 interception.dll not found" }
          Copy-Item $dll.FullName "publish\interception.dll" -Force
          $installer = Get-ChildItem -Path "interception" -Recurse -Filter "install-interception.exe" | Select-Object -First 1
          if (-not $installer) { throw "install-interception.exe not found" }
          New-Item -ItemType Directory -Force -Path "publish\driver" | Out-Null
          Copy-Item -Path "$($installer.Directory.FullName)\*" -Destination "publish\driver" -Recurse -Force

      # ── Velopack: pack release for auto-updates ────────────────
      - name: Install Velopack CLI (vpk)
        shell: pwsh
        run: dotnet tool install --global vpk

      - name: Pack with Velopack
        shell: pwsh
        run: |
          vpk pack `
            --packId "KeyDisabler" `
            --packVersion "${{ github.run_number }}.0.0" `
            --packDir "publish" `
            --mainExe "${{ env.APP_NAME }}.exe"

      - name: Upload Velopack RELEASES artifact
        uses: actions/upload-artifact@v4
        with:
          name: RELEASES
          path: RELEASES/*

      # ── Inno Setup: traditional installer wizard ─────────────
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build Inno Setup installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "src\${{ env.APP_NAME }}.Installer\${{ env.APP_NAME }}.iss"

      - name: Upload Inno Setup installer
        uses: actions/upload-artifact@v4
        with:
          name: KeyDisablerSetup-win-x64
          path: installer-output/${{ env.APP_NAME }}Setup.exe
          if-no-files-found: error

      - name: Rename installer for release
        shell: pwsh
        run: |
          Copy-Item "installer-output\${{ env.APP_NAME }}Setup.exe" "${{ env.APP_NAME }}Setup-win-x64.exe" -Force

      # ── Portable zip ─────────────────────────────────────────
      - name: Upload portable zip
        shell: pwsh
        run: |
          Compress-Archive -Path publish\* -DestinationPath ${{ env.APP_NAME }}-portable-win-x64.zip -Force

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-portable-win-x64
          path: ${{ env.APP_NAME }}-portable-win-x64.zip

      # ── Publish release on GitHub ────────────────────────────
      - name: Publish Release on GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}.0.0
          name: Key Disabler v${{ github.run_number }}.0.0
          body: |
            Auto-built release from commit ${{ github.sha }}.

            ## 📥 Downloads
            - **KeyDisablerSetup-win-x64.exe** — Standard Windows installer (recommended)
            - **KeyDisabler-portable-win-x64.zip** — Portable version (no install needed)

            ## ⚡ Auto-Updates
            After installing, the app automatically checks for updates on startup.
            You can also check manually via the "✓ Check for Updates" button in the app footer.
          draft: false
          prerelease: true
          files: |
            ${{ env.APP_NAME }}Setup-win-x64.exe
            ${{ env.APP_NAME }}-portable-win-x64.zip
            RELEASES/*
